version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: ["python", "-m", "app.app", "--port", "8000"]
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - OPENAI_API_KEY=$OPENAI_API_KEY
      - SERPER_API_KEY=$SERPER_API_KEY
      - SCRAPER_API_KEY=$SCRAPER_API_KEY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
